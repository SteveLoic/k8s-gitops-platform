apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-dev
spec:
  source:
    repoURL: https://github.com/SteveLoic/k8s-gitops-platform.git
    targetRevision: main
    path: overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
