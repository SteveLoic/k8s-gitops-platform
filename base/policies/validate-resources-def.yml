apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resources
spec:
  validationFailureAction: Enforce
  rules:
    - name: check-resources
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - production
                - dev
      validate:
        message: "Requests und Limits müssen gesetzt sein"
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    cpu: "*"
                    memory: "*"
                  limits:
                    cpu: "*"
                    memory: "*"
