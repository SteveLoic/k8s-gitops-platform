apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: validate-pod-security
spec:
  validationFailureAction: Enforce
  background: true

  rules:
    - name: require-non-root
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - prod
                - dev
      validate:
        message: "Containers must not run as root"
        pattern:
          spec:
            securityContext:
              runAsNonRoot: true

    - name: require-seccomp
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - prod
                - dev
      validate:
        message: "Seccomp profile must be RuntimeDefault"
        pattern:
          spec:
            securityContext:
              seccompProfile:
                type: RuntimeDefault

    - name: disallow-privileged
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - prod
                - dev
      validate:
        message: "Privileged containers are not allowed"
        pattern:
          spec:
            containers:
              - securityContext:
                  privileged: false
